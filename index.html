<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vortex Gym</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 text-white font-sans">

  <!-- Navbar -->
  <nav class="flex justify-between items-center px-8 py-5 bg-black/20 backdrop-blur-md sticky top-0">
    <h1 class="text-2xl font-bold">VORTEX GYM</h1>
  </nav>

  <!-- Hero -->
  <section class="px-8 py-20 text-center">
    <h2 class="text-4xl font-bold mb-4">Train Hard. Build Confidence.</h2>
    <p class="mb-6">Teen Fitness Gym for strength and health.</p>
  </section>

  <!-- BMI -->
  <section class="px-8 py-16 text-center bg-black/10">
    <h2 class="text-3xl font-bold mb-4">BMI Calculator</h2>

    <input id="weight" type="number" placeholder="Weight (kg)" class="p-2 text-black rounded m-2"/>
    <input id="height" type="number" placeholder="Height (cm)" class="p-2 text-black rounded m-2"/>

    <br/>

    <button onclick="calcBMI()" class="bg-white text-blue-600 px-6 py-2 rounded mt-4 font-bold">
      Calculate
    </button>

    <p id="result" class="mt-4 text-xl"></p>
  </section>

  <script>
    function calcBMI() {
      let w = document.getElementById("weight").value;
      let h = document.getElementById("height").value;

      if (!w || !h) return;

      let m = h / 100;
      let bmi = (w / (m * m)).toFixed(1);

      let status = "";

      if (bmi < 18.5) status = "Underweight";
      else if (bmi < 25) status = "Healthy";
      else if (bmi < 30) status = "Overweight";
      else status = "Obese";

      document.getElementById("result").innerHTML =
        "BMI: " + bmi + " (" + status + ")";
    }
  </script>

</body>
</html>
